<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#f6faf9;--bg2:#eef5f4;
  --white:#ffffff;
  --text:#1a2422;--text2:#4a5654;--muted:#93a19e;
  --border:#dfe9e7;--border2:#c9d8d5;
  --teal:#2f8f8a;--teal-l:#5fb3ae;--teal-bg:#eef8f7;
  --accent:#e8734a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}html{height:-webkit-fill-available;}
body{
  background:var(--bg);font-family:'DM Sans','Hiragino Sans',sans-serif;color:var(--text);
  display:flex;flex-direction:column;height:100vh;height:100dvh;min-height:-webkit-fill-available;
}
::placeholder{color:var(--muted);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── Header ── */
#header{
  padding:16px 20px;padding-top:max(16px, env(safe-area-inset-top));
  background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
#header .logo{font-weight:600;font-size:16px;letter-spacing:0.02em;}
#header .badge{font-size:10px;color:var(--teal);letter-spacing:0.1em;text-transform:uppercase;border:1px solid rgba(47,143,138,0.3);padding:2px 7px;border-radius:3px;}

/* ── Chat area ── */
#chatArea{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:12px;}
.msg{display:flex;gap:8px;max-width:88%;}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.bubble{
  padding:11px 15px;border-radius:16px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;
}
.msg.bot .bubble{background:var(--white);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text);}
.msg.user .bubble{background:var(--teal);color:#fff;border-top-right-radius:4px;}

.summary-card{
  background:var(--white);border:1px solid var(--border2);border-radius:14px;padding:16px;
  align-self:stretch;max-width:100%;
}
.summary-card h3{font-size:13px;color:var(--teal);letter-spacing:0.06em;margin-bottom:10px;}
.summary-row{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 0;border-bottom:1px solid var(--bg2);}
.summary-row:last-of-type{border-bottom:none;}
.summary-row span:first-child{color:var(--text2);}
.summary-total{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1.5px solid var(--border);font-size:15px;font-weight:600;}
.summary-total .amount{color:var(--teal);}
.summary-note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5;}
.cta-btn{
  margin-top:14px;width:100%;padding:12px;border:none;border-radius:10px;
  background:var(--teal);color:#fff;font-size:14px;font-weight:500;font-family:inherit;
}
.cta-btn:disabled{opacity:0.5;}

/* ── Before/After ── */
.ba-upload{margin-top:14px;}
.ba-upload input[type=file]{display:none;}
.ba-upload label{
  display:block;text-align:center;padding:12px;border:1.5px dashed var(--border2);
  border-radius:10px;font-size:13px;color:var(--text2);cursor:pointer;
}
.ba-preview{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.ba-preview img{width:100%;border-radius:10px;display:block;}
.ba-label{font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:4px;}
.ba-loading{font-size:12.5px;color:var(--teal);margin-top:10px;text-align:center;}
.ba-error{font-size:12px;color:#c0504a;margin-top:8px;}

/* ── Chips ── */
#chipArea{padding:4px 16px 12px;display:flex;flex-wrap:wrap;gap:8px;flex-shrink:0;}
.chip{
  background:var(--white);border:1px solid rgba(47,143,138,0.3);border-radius:20px;
  padding:8px 15px;font-size:13px;color:var(--teal);cursor:pointer;font-family:inherit;
  letter-spacing:0.02em;transition:all 0.15s;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
.chip:active{transform:scale(0.96);background:var(--teal-bg);}

/* ── Input bar ── */
#inputBar{
  display:flex;gap:8px;padding:10px 16px;padding-bottom:max(10px, env(safe-area-inset-bottom));
  background:var(--white);border-top:1px solid var(--border);flex-shrink:0;
}
#textInput{
  flex:1;border:1px solid var(--border2);border-radius:20px;padding:10px 16px;
  font-size:14px;font-family:inherit;background:var(--bg2);
}
#sendBtn{
  width:40px;height:40px;border-radius:50%;border:none;background:var(--teal);color:#fff;
  font-size:16px;flex-shrink:0;
}
#sendBtn:disabled{opacity:0.4;}

<body>

<div id="header">
  <div class="logo">クリーンAI見積もり</div>

</div>

<div id="chatArea"></div>

<div id="inputBar">

  <button id="sendBtn" onclick="handleFreeText()">↑</button>
</div>

<!-- ── PDF提案書テンプレート(画面には表示せず、html2canvasでの描画専用) ── -->
<div id="pdfTemplate" style="display:none;">
  <div style="width:794px;background:#ffffff;padding:56px;font-family:'DM Sans','Hiragino Sans',sans-serif;color:#1a2422;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #2f8f8a;padding-bottom:18px;margin-bottom:28px;">
      <div>
        <div style="font-size:22px;font-weight:600;letter-spacing:0.02em;">お見積もりご提案書</div>
        <div style="font-size:11px;color:#93a19e;letter-spacing:0.1em;margin-top:4px;">HOUSE CLEANING PROPOSAL</div>
      </div>
      <div style="font-size:11px;color:#4a5654;" id="pdf-date"></div>
    </div>

    <table id="pdf-info-table" style="width:100%;border-collapse:collapse;margin-bottom:24px;"></table>

    <div id="pdf-image-section" style="display:flex;gap:16px;margin-bottom:24px;">
      <div style="flex:1;">
        <div style="font-size:10px;color:#93a19e;letter-spacing:0.1em;margin-bottom:6px;">BEFORE</div>
        <img id="pdf-before-img" style="width:100%;border-radius:8px;display:block;" />
      </div>
      <div style="flex:1;">
        <div style="font-size:10px;color:#93a19e;letter-spacing:0.1em;margin-bottom:6px;">AFTER(AI生成イメージ)</div>
        <img id="pdf-after-img" style="width:100%;border-radius:8px;display:block;" />
      </div>
    </div>

    <div style="background:#eef8f7;border-radius:10px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <span style="font-size:13px;color:#4a5654;">概算お見積もり金額</span>
      <span style="font-size:24px;font-weight:600;color:#2f8f8a;" id="pdf-amount"></span>
    </div>

    <div style="font-size:10.5px;color:#93a19e;line-height:1.7;">
      ※本お見積もりはAIによる概算です。実際の作業内容・状態確認後に正式な金額をご案内いたします。<br>
      ※AFTER画像はAIによる生成イメージであり、実際の仕上がりを保証するものではありません。
    </div>
  </div>
</div>

<script>
/* =========================================================
   片付け系ビフォーアフター提案AI ヒアリングチャット MVP
   business-types.js の設定を元に、業種選択→質問→チップ回答→…と進行し、
   最後に概算見積もりのサマリーを表示する。
   ハウスクリーニング/遺品整理・生前整理はビフォーアフター画像生成に対応。
   特殊清掃は現場写真がセンシティブなため、見積もりのみ対応(画像生成なし)。
   ========================================================= */

const chatArea = document.getElementById('chatArea');
const chipArea = document.getElementById('chipArea');
const textInput = document.getElementById('textInput');

const EDGE_URL = 'https://sfhtvtcmgueystyuhzvd.supabase.co/functions/v1/housecleaning-agent';

const state = {
  mode: 'selectType',   // 'selectType' → 'hearing' → 'done'
  businessTypeKey: null,
  step: 0,
  answers: {},
  freeNotes: [],
  images: null,
  businessSlug: new URLSearchParams(location.search).get('biz'), // ?biz=業者ID
  businessProfile: null   // 業者プロフィール(料金上書き・対応エリア・資料テキスト)
};

let config = null; // 業種選択後にBUSINESS_TYPES[key]がセットされる

// 見積もり完了を業者単位でログする(ソフト制限。上限超過でも顧客体験はブロックしない)
async function logQuoteCompletion() {
  if (!state.businessSlug) return;
  try {
    await fetch(EDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'log_quote', business_slug: state.businessSlug }),
    });
  } catch (err) {
    // ログ失敗は顧客体験に影響させない
  }
}

// 業者プロフィール(料金上書き・対応エリア・資料テキスト)をURLの?biz=から読み込む
async function loadBusinessProfile() {
  if (!state.businessSlug) return;
  try {
    const res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'get_profile', business_slug: state.businessSlug }),
    });
    const data = await res.json();
    if (data.profile) {
      state.businessProfile = data.profile;
      const logo = document.querySelector('#header .logo');
      if (logo) logo.textContent = data.profile.business_name;
    }
  } catch (err) {
    // プロフィール取得に失敗しても標準設定でチャットは継続する
  }
}

// お客様からの自由な質問(対応エリア・料金の詳細など)にAIが回答する。
// 業者プロフィール(対応エリア・資料テキスト)があればそれを踏まえて回答する。
function isQuestionLike(text) {
  return /[??]$/.test(text) || /(ですか|でしょうか|ますか|いくら|何時|どこ|できます|可能)/.test(text);
}

async function askBusinessAI(question) {
  const loadingId = `ai-loading-${Date.now()}`;
  const loadingMsg = document.createElement('div');
  loadingMsg.className = 'msg bot';
  loadingMsg.id = loadingId;
  loadingMsg.innerHTML = '<div class="bubble">考えています…</div>';
  chatArea.appendChild(loadingMsg);
  chatArea.scrollTop = chatArea.scrollHeight;

  try {
    const res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'chat',
        business_slug: state.businessSlug,
        question,
        business_type_label: config?.label,
      }),
    });
    const data = await res.json();
    document.getElementById(loadingId)?.remove();
    if (!res.ok || !data.answer) {
      addMessage('申し訳ございません、うまくお答えできませんでした。担当者に直接ご確認ください。', 'bot');
      return;
    }
    addMessage(data.answer, 'bot');
  } catch (err) {
    document.getElementById(loadingId)?.remove();
    addMessage('通信エラーが発生しました。時間をおいて再度お試しください。', 'bot');
  }
}

function addMessage(text, sender) {
  const msg = document.createElement('div');
  msg.className = `msg ${sender}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function renderChips(chips) {
  chipArea.innerHTML = '';
  if (!chips || chips.length === 0) return;
  chips.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = label;
    btn.onclick = () => selectChip(label);
    chipArea.appendChild(btn);
  });
}

function askBusinessTypeQuestion() {
  addMessage('どのサービスについてご相談ですか?', 'bot');
  const labels = Object.values(BUSINESS_TYPES).map(t => t.label);
  renderChips(labels);
}

// 現在のconfigの中で、まだ回答されていない最初の質問を返す(自由入力による自動入力で
// 質問の順番が飛んでもここで吸収する)
function nextUnansweredQuestion() {
  return config.hearingQuestions.find(q => !(q.id in state.answers));
}

function askCurrentQuestion() {
  const q = nextUnansweredQuestion();
  if (!q) {
    finishHearing();
    return;
  }
  addMessage(q.label, 'bot');
  renderChips(q.chips);
}

// 自由入力テキストの中に、質問のチップ(選択肢)と一致する語が含まれていれば
// 自動的にその質問への回答として採用する(例:「キッチンの換気扇」→ room_type:「キッチン」)
function autofillFromText(text) {
  config.hearingQuestions.forEach(q => {
    if (q.id in state.answers) return;
    const matched = q.chips.find(chip => text.includes(chip));
    if (matched) state.answers[q.id] = matched;
  });
}

// 自由入力テキストから、どの業種の相談かをキーワードで推測する。
// より具体的な業種(特殊清掃・遺品整理)を先に判定し、汎用的なハウスクリーニングは最後にする。
const BUSINESS_TYPE_KEYWORDS = {
  specialCleaning: ['特殊清掃', '孤独死', '事故死', '事故物件', '孤立死'],
  estateCleanup: ['遺品整理', '遺品', '生前整理', '空き家'],
  housecleaning: ['ハウスクリーニング', 'クリーニング', '掃除', '清掃', '換気扇', 'キッチン', '浴室', 'お風呂', 'トイレ']
};

function detectBusinessType(text) {
  for (const key of Object.keys(BUSINESS_TYPE_KEYWORDS)) {
    if (BUSINESS_TYPE_KEYWORDS[key].some(kw => text.includes(kw))) return key;
  }
  return null;
}

function selectChip(label) {
  if (state.mode === 'selectType') {
    const key = Object.keys(BUSINESS_TYPES).find(k => BUSINESS_TYPES[k].label === label);
    state.businessTypeKey = key;
    config = BUSINESS_TYPES[key];
    state.mode = 'hearing';
    addMessage(label, 'user');
    chipArea.innerHTML = '';
    setTimeout(askCurrentQuestion, 300);
    return;
  }

  const q = nextUnansweredQuestion();
  if (!q) return;
  addMessage(label, 'user');
  state.answers[q.id] = label;
  chipArea.innerHTML = '';
  setTimeout(askCurrentQuestion, 300);
}

function handleFreeText() {
  const text = textInput.value.trim();
  if (!text) return;

  if (RESET_KEYWORDS.some(k => text.includes(k))) {
    textInput.value = '';
    resetFlow();
    return;
  }

  addMessage(text, 'user');
  state.freeNotes.push(text);
  textInput.value = '';

  // 質問らしき自由入力(「〜ですか?」「対応エリアは?」等)はAIチャットに回す。
  // ただし業種未選択(selectType)で、かつ業種のキーワードとして解釈できる場合は業種選択を優先する。
  const looksLikeQuestion = isQuestionLike(text);
  const detectedType = state.mode === 'selectType' ? detectBusinessType(text) : null;

  if (looksLikeQuestion && !(state.mode === 'selectType' && detectedType)) {
    askBusinessAI(text);
    return;
  }

  if (state.mode === 'selectType') {
    const key = detectedType;
    if (!key) {
      addMessage('恐れ入りますが、上のボタンからサービスの種類を選んでいただけますか?', 'bot');
      return;
    }
    state.businessTypeKey = key;
    config = BUSINESS_TYPES[key];
    state.mode = 'hearing';
    autofillFromText(text); // 例:「キッチンの換気扇」→ room_typeを自動で「キッチン」に
    chipArea.innerHTML = '';
    setTimeout(askCurrentQuestion, 300);
    return;
  }

  if (state.mode !== 'hearing') return;

  // 自由入力の中にチップ相当の語が含まれていれば自動採用し、
  // 現在の質問がまだ未回答ならテキストそのものを回答として採用する
  autofillFromText(text);
  const q = nextUnansweredQuestion();
  if (q && !(q.id in state.answers)) {
    state.answers[q.id] = text;
  }
  setTimeout(askCurrentQuestion, 300);
}

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleFreeText();
});

function estimateCost(answers) {
  const { baseFee, perTsuboFee, multiplier } = config.costModel;
  // 業者プロフィールに料金上書きがあれば優先する
  const override = state.businessProfile?.price_overrides?.[state.businessTypeKey];
  const effectiveBaseFee = override?.baseFee ?? baseFee;
  const effectivePerTsuboFee = override?.perTsuboFee ?? perTsuboFee;

  const sizeAnswer = answers[config.sizeQuestionId];
  const multiplierAnswer = answers[config.multiplierQuestionId];
  const tsubo = ROOM_SIZE_TSUBO[sizeAnswer] || 15;
  const m = multiplier[multiplierAnswer] ?? 1.0;
  const raw = (effectiveBaseFee + effectivePerTsuboFee * tsubo) * m;
  // 100円単位で丸め
  return Math.round(raw / 100) * 100;
}

// blob URL(createObjectURLで作った一時URL)をPDF埋め込み用にBase64データURLへ変換する
async function blobUrlToDataUrl(blobUrl) {
  const res = await fetch(blobUrl);
  const blob = await res.blob();
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

// ── PDF提案書生成(RENOのgeneratePDFと同じ html2canvas → jsPDF の方式) ──
async function generatePDF(triggerBtn) {
  const originalLabel = triggerBtn.textContent;
  triggerBtn.disabled = true;
  triggerBtn.textContent = '生成中…';

  try {
    const tmpl = document.getElementById('pdfTemplate');
    tmpl.style.display = 'block';

    document.getElementById('pdf-date').textContent =
      new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

    const estimated = estimateCost(state.answers);
    const fields = config.hearingQuestions.map(q => [q.label, state.answers[q.id] || '—']);
    document.getElementById('pdf-info-table').innerHTML = fields.map(([label, val]) => `
      <tr style="border-bottom:1px solid #e5ece9;">
        <td style="padding:9px 0;color:#93a19e;font-size:10.5px;letter-spacing:0.08em;width:130px;">${label}</td>
        <td style="padding:9px 0;color:#1a2422;font-size:13px;font-weight:500;">${val}</td>
      </tr>`).join('');

    document.getElementById('pdf-amount').textContent = `¥${estimated.toLocaleString()}`;

    const imageSection = document.getElementById('pdf-image-section');
    if (state.images) {
      imageSection.style.display = 'flex';
      document.getElementById('pdf-before-img').src = state.images.before || '';
      document.getElementById('pdf-after-img').src = state.images.after || '';
    } else {
      imageSection.style.display = 'none';
    }

    // 画像の読み込み待ち
    await new Promise((r) => setTimeout(r, 500));

    const canvas = await html2canvas(tmpl.firstElementChild, {
      scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#ffffff',
      width: 794, windowWidth: 794,
    });

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, H = 297;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const canvasH = (canvas.height / canvas.width) * W;

    if (canvasH <= H) {
      doc.addImage(imgData, 'JPEG', 0, 0, W, canvasH);
    } else {
      let srcY = 0;
      const pageH = (H / W) * canvas.width;
      while (srcY < canvas.height) {
        const pageCanvas = document.createElement('canvas');
        pageCanvas.width = canvas.width;
        pageCanvas.height = Math.min(pageH, canvas.height - srcY);
        pageCanvas.getContext('2d').drawImage(canvas, 0, -srcY);
        doc.addImage(pageCanvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, W, H);
        srcY += pageH;
        if (srcY < canvas.height) doc.addPage();
      }
    }

    doc.save(`${config.label}-お見積もり-${Date.now()}.pdf`);
  } catch (err) {
    alert('PDFの生成に失敗しました。時間をおいて再度お試しください。');
  } finally {
    triggerBtn.disabled = false;
    triggerBtn.textContent = originalLabel;
    document.getElementById('pdfTemplate').style.display = 'none';
  }
}

// ── ビフォーアフター画像生成 ──
// 認証(アカウント管理)は開発部引き継ぎ範囲のため、匿名のdevice_idのみで
// Supabase Edge Function(housecleaning-agent)の月間利用回数を制御する。

function getDeviceId() {
  let id = localStorage.getItem('hc_device_id');
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`);
    localStorage.setItem('hc_device_id', id);
  }
  return id;
}

async function generateBeforeAfter(file, promptHint, resultBox) {
  resultBox.innerHTML = '<div class="ba-loading">ビフォーアフターイメージを生成中です…(20〜30秒ほどかかります)</div>';

  const beforeUrl = URL.createObjectURL(file);

  try {
    const form = new FormData();
    form.append('device_id', getDeviceId());
    form.append('prompt', promptHint);
    if (state.businessSlug) form.append('business_slug', state.businessSlug);
    form.append('image', file);

    const res = await fetch(EDGE_URL, { method: 'POST', body: form });
    const data = await res.json();

    if (!res.ok) {
      if (data.error === 'limit_exceeded' && data.reason === 'business_plan') {
        resultBox.innerHTML = `<div class="ba-error">今月のビフォーアフター画像生成の上限(${data.limit}回・${data.plan}プラン)に達しました。担当者にご確認ください。</div>`;
      } else if (data.error === 'limit_exceeded') {
        resultBox.innerHTML = `<div class="ba-error">今月の無料生成回数(${data.limit}回)の上限に達しました。来月またお試しください。</div>`;
      } else {
        resultBox.innerHTML = `<div class="ba-error">画像生成に失敗しました。時間をおいて再度お試しください。</div>`;
      }
      return;
    }

    const afterB64 = data.data?.[0]?.b64_json;
    const afterUrl = afterB64 ? `data:image/png;base64,${afterB64}` : data.data?.[0]?.url;

    // 生成した画像はPDF提案書でも使うのでstateに保持しておく(beforeはBase64化して保持)
    const beforeB64Url = await blobUrlToDataUrl(beforeUrl);
    state.images = { before: beforeB64Url, after: afterUrl };

    const pdfBtnId = `pdf-btn-${Date.now()}`;
    resultBox.innerHTML = `
      <div class="ba-preview">
        <div>
          <div class="ba-label">BEFORE</div>
          <img src="${beforeUrl}" />
        </div>
        <div>
          <div class="ba-label">AFTER(AI生成イメージ)</div>
          <img src="${afterUrl}" />
        </div>
      </div>
      <button class="cta-btn" id="${pdfBtnId}">📄 PDF提案書を作成する</button>
    `;
    resultBox.querySelector(`#${pdfBtnId}`).addEventListener('click', (e) => generatePDF(e.target));
  } catch (err) {
    resultBox.innerHTML = `<div class="ba-error">通信エラーが発生しました。時間をおいて再度お試しください。</div>`;
  }
  chatArea.scrollTop = chatArea.scrollHeight;
}

function finishHearing() {
  state.mode = 'done';
  addMessage('ありがとうございます、内容をもとに概算お見積もりを作成しますね。', 'bot');
  logQuoteCompletion(); // 業者側の月間見積もり件数カウント(プラン上限判定用、ソフト制限)

  const estimated = estimateCost(state.answers);
  const summaryRows = config.hearingQuestions
    .map(q => `<div class="summary-row"><span>${q.label}</span><span>${state.answers[q.id] || '-'}</span></div>`)
    .join('');

  const card = document.createElement('div');
  card.className = 'summary-card';

  if (config.supportsImageGeneration) {
    const uploadId = `ba-upload-${Date.now()}`;
    const resultId = `ba-result-${Date.now()}`;
    card.innerHTML = `
      <h3>概算お見積もり</h3>
      ${summaryRows}
      <div class="summary-total"><span>概算費用</span><span class="amount">¥${estimated.toLocaleString()}</span></div>
      <div class="summary-note">※実際の状態を確認後、正式なお見積もりをご案内します。</div>
      <div class="ba-upload">
        <label for="${uploadId}">📷 現場の写真をアップロードして、きれいになったイメージを見る</label>
        <input type="file" id="${uploadId}" accept="image/*" capture="environment" />
      </div>
      <div id="${resultId}"></div>
    `;
    chatArea.appendChild(card);
    chatArea.scrollTop = chatArea.scrollHeight;

    const fileInput = card.querySelector(`#${uploadId}`);
    const resultBox = card.querySelector(`#${resultId}`);
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const promptHint = `対応内容: ${state.answers[config.multiplierQuestionId] || '指定なし'}`;
      generateBeforeAfter(file, promptHint, resultBox);
    });
    appendRestartButton(card);
  } else {
    // 特殊清掃などビフォーアフター画像を提供しない業種: 見積もりのみ+画像なしPDF
    const pdfBtnId = `pdf-btn-${Date.now()}`;
    card.innerHTML = `
      <h3>概算お見積もり</h3>
      ${summaryRows}
      <div class="summary-total"><span>概算費用</span><span class="amount">¥${estimated.toLocaleString()}</span></div>
      <div class="summary-note">※現場の状態は個別性が高いため、実際にご訪問・確認のうえ正式な金額をご案内します。この業種ではビフォーアフター画像のご案内は行っておりません。</div>
      <button class="cta-btn" id="${pdfBtnId}">📄 PDF見積書を作成する</button>
    `;
    chatArea.appendChild(card);
    chatArea.scrollTop = chatArea.scrollHeight;
    card.querySelector(`#${pdfBtnId}`).addEventListener('click', (e) => generatePDF(e.target));
    appendRestartButton(card);
  }
}

// 見積もりカードの下に「最初からやり直す」ボタンを追加する
function appendRestartButton(card) {
  const btn = document.createElement('button');
  btn.className = 'cta-btn';
  btn.style.background = '#ffffff';
  btn.style.color = '#2f8f8a';
  btn.style.border = '1px solid #2f8f8a';
  btn.style.marginTop = '10px';
  btn.textContent = '🔄 最初からやり直す';
  btn.onclick = resetFlow;
  card.appendChild(btn);
}

// チャット・見積もり状態をすべてリセットし、業種選択からやり直す
function resetFlow() {
  state.mode = 'selectType';
  state.businessTypeKey = null;
  state.step = 0;
  state.answers = {};
  state.freeNotes = [];
  state.images = null;
  config = null;
  chatArea.innerHTML = '';
  chipArea.innerHTML = '';
  addMessage('最初からやり直しますね。', 'bot');
  askBusinessTypeQuestion();
}

// 自由入力で「やり直し」等のキーワードが入力された場合もリセットとして扱う
const RESET_KEYWORDS = ['やり直し', 'やりなおし', 'リセット', '最初から'];

// 初期化: 業者プロフィール(?biz=)があれば読み込んでからチャットを開始する
(async function init() {
  await loadBusinessProfile();
  addMessage(
    state.businessProfile
      ? `こんにちは!${state.businessProfile.business_name}です。ご相談内容についていくつか質問させてください。`
      : 'こんにちは!ご相談内容についていくつか質問させてください。',
    'bot'
  );
  askBusinessTypeQuestion();
})();
</script>
